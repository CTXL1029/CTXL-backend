<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Điều Khiển Đèn Cổng</title>
    <link
      rel="icon"
      href="https://files.catbox.moe/tpfdr4.png"
      type="image/png"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="login-screen" class="container">
      <h2>🔐 Xác thực bảo mật</h2>
      <p>Vui lòng nhập Token Admin để điều khiển hệ thống.</p>
      <input type="password" id="password" placeholder="Nhập admin_token..." />
      <br />
      <button onclick="checkPassword()">Đăng Nhập</button>
    </div>

    <div id="control-screen" class="container hidden">
      <h2>💡 ĐIỀU KHIỂN ĐÈN CỔNG</h2>
      <p class="status">
        Trạng thái: <span id="light-status">Đang tải...</span>
      </p>
      <button id="toggle-btn" class="btn-toggle" onclick="toggleLight()">
        BẬT ĐÈN
      </button>

      <hr style="margin: 30px 0; border: 0.5px solid #eee" />

      <h3>⏰ Cài đặt Giờ TẮT</h3>
      <p class="info">
        (Giờ BẬT được hệ thống tự động tính theo Hoàng Hôn + 15p mỗi ngày)
      </p>
      <input type="time" id="off-time" />
      <br />
      <button onclick="updateOffTime()" class="btn-update">Lưu giờ TẮT</button>

      <p style="margin-top: 30px">
        <button onclick="logout()" class="btn-logout">Đăng Xuất</button>
      </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="script.js"></script>
  </body>
</html>
