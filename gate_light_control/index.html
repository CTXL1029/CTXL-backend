<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Điều Khiển Đèn Cổng</title>
    <link
      rel="icon"
      href="https://files.catbox.moe/tpfdr4.png"
      type="image/png"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading-screen" class="container">
      <h2>🔐 Đang kiểm tra bảo mật...</h2>
      <p>Vui lòng chờ hệ thống thiết lập kết nối an toàn.</p>
    </div>

    <div id="control-screen" class="container hidden">
      <h2>Bảng Điều Khiển</h2>
      <div id="status-box" class="status off">🌙 ĐÈN ĐANG TẮT</div>
      <button class="btn-toggle" onclick="toggleLight()">BẬT / TẮT</button>

      <hr />
      <h3 style="color: #2c3e50; margin-bottom: 20px">Cài Đặt Hẹn Giờ</h3>

      <div class="form-group">
        <label>🕒 Giờ BẬT tự động:</label>
        <input type="time" id="onTime" required />
      </div>

      <div class="form-group">
        <label>🕧 Giờ TẮT tự động:</label>
        <input type="time" id="offTime" required />
      </div>
      <button class="btn-submit" onclick="saveSettings()">LƯU CÀI ĐẶT</button>

      <p style="margin-top: 30px">
        <button onclick="logout()" class="btn-logout">Đăng Xuất</button>
      </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
  </body>
</html>
